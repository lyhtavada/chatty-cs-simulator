services:
  - type: web
    name: live-chat-simulator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --log-level debug --preload
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LEADER_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
